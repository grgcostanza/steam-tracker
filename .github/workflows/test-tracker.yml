name: Test Steam Tracker

on:
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions UI

jobs:
  track:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run daily tracker
        env:
          MAKERS_API_KEY: ${{ secrets.MAKERS_API_KEY }}
          MAKERS_WEBHOOK_URL: ${{ secrets.MAKERS_WEBHOOK_URL }}
          EMAIL_TO: 'tyler@makersfund.com, alli@makersfund.com'
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run daily 2>&1 | tee tracker-output.log

      - name: Save latest watchlist for debugging
        if: always()
        run: |
          echo "=== Latest watchlist ===" >> tracker-output.log
          cat watchlists/$(ls -t watchlists/ | head -1) >> tracker-output.log 2>/dev/null || echo "No watchlist found" >> tracker-output.log

      - name: Upload debug logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tracker-debug-logs
          path: tracker-output.log
          retention-days: 3

      - name: Clean up test files
        run: |
          # Remove newly created report and watchlist files
          find reports/ -name "report_*.json" -type f -mmin -10 -delete
          find reports/ -name "report_*.md" -type f -mmin -10 -delete
          find watchlists/ -name "watchlist_*.md" -type f -mmin -10 -delete
          echo "Test files cleaned up successfully"
